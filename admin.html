<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bake One | Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo">Bake One Admin</div>
        <ul class="nav-links">
            <li><a href="index.html">View Storefront</a></li>
            <li><a href="#" class="logout-btn" onclick="logout()">Logout</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Manage Products</h2>
        </div>

        <div class="admin-form-group">
            <h3>Add New Product</h3>
            <form id="add-product-form">
                <div class="form-row">
                    <input type="text" id="prod-name" class="admin-input" placeholder="Product Name" required>
                    <input type="text" id="prod-price" class="admin-input" placeholder="Price (e.g., ₹500)" required>
                </div>
                <div class="form-row">
                    <input type="url" id="prod-image" class="admin-input"
                        placeholder="Image URL (Unsplash or direct link)" required>
                </div>
                <button type="submit" class="cta-btn">Add Product</button>
            </form>
        </div>

        <div class="admin-form-group">
            <h3>Current Inventory</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventory-list">
                    <!-- Inventory items injected by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
