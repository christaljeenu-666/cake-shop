<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bake One | Your Cart</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo">Bake One</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#products">Add More</a></li>
        </ul>
    </nav>

    <div class="page-container">
        <h1>Shopping Cart</h1>
        <div id="cart-items-container">
            <!-- Cart items will be injected here -->
        </div>

        <div id="empty-cart-msg" style="display:none; text-align:center; padding: 3rem;">
            <p>Your cart is empty.</p>
            <a href="index.html#products" class="cta-btn">Start Shopping</a>
        </div>

        <div id="cart-summary-section" class="cart-summary" style="display:none;">
            <h2>Total: <span id="cart-total">₹0.00</span></h2>
            <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="cta-btn" style="background: rgba(255,255,255,0.1);" onclick="clearCart()">Clear
                    Cart</button>
                <button class="cta-btn" onclick="window.location.href='order.html'">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('bakeone_cart_items')) || [];

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const summary = document.getElementById('cart-summary-section');
            const emptyMsg = document.getElementById('empty-cart-msg');

            if (cart.length === 0) {
                container.innerHTML = '';
                summary.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';
            summary.style.display = 'block';

            let tableHTML = `
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Total</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            let grandTotal = 0;

            cart.forEach((item, index) => {
                const numericPrice = parseFloat(item.price.replace('₹', '').replace(',', ''));
                const itemTotal = numericPrice * item.quantity;
                grandTotal += itemTotal;

                tableHTML += `
                    <tr>
                        <td>
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <img src="${item.image}" class="cart-img">
                                <span>${item.name}</span>
                            </div>
                        </td>
                        <td>
                            <button class="cta-btn" style="padding: 2px 8px;" onclick="updateQty(${index}, -1)">-</button>
                            <span style="margin: 0 10px;">${item.quantity}</span>
                            <button class="cta-btn" style="padding: 2px 8px;" onclick="updateQty(${index}, 1)">+</button>
                        </td>
                        <td>${item.price}</td>
                        <td>₹${itemTotal.toLocaleString()}</td>
                        <td><button class="btn-delete" style="padding: 5px 10px;" onclick="removeItem(${index})">Remove</button></td>
                    </tr>
                `;
            });

            tableHTML += `</tbody></table>`;
            container.innerHTML = tableHTML;
            document.getElementById('cart-total').textContent = `₹${grandTotal.toLocaleString()}`;
        }

        function updateQty(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            saveAndRender();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            saveAndRender();
        }

        function clearCart() {
            if (confirm('Are you sure you want to clear your cart?')) {
                cart = [];
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('bakeone_cart_items', JSON.stringify(cart));
            renderCart();
        }

        renderCart();
    </script>
</body>

</html>
